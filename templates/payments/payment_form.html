{% extends 'base.html' %}
{% block content %}

<h2>Payment</h2>

<p><strong>Room:</strong> {{ booking.room.room_number }}</p>
<p><strong>Total Amount:</strong> ₹{{ booking.total_price }}</p>

<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success">Pay Now</button>
</form>

{% endblock %}
