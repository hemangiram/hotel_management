{% extends "base.html" %}
{% block content %}

<div class="container mt-5" style="max-width:500px;">
    <h3 class="mb-4">Register</h3>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary w-100">
            Register
        </button>
    </form>

    <p class="mt-3">
        Already have account?
        <a href="{% url 'login' %}">Login</a>
    </p>
</div>

{% endblock %}
