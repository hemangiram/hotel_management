{% extends "base.html" %}
{% block content %}

<div class="container mt-5" style="max-width:500px;">
    <h3 class="mb-4">Login</h3>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success w-100">
            Login
        </button>
    </form>

    <p class="mt-3">
        Don't have account?
        <a href="{% url 'register' %}">Register</a>
    </p>
</div>

{% endblock %}
