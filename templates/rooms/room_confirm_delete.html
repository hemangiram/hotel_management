{% extends 'base.html' %}
{% block content %}

<h2>Are you sure you want to delete this room?</h2>

<p>Room {{ room.room_number }}</p>

<form method="POST">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, Delete</button>
    <a href="{% url 'room_list' %}" class="btn btn-secondary">Cancel</a>
</form>

{% endblock %}
